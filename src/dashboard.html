<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Productivity - Backend Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .log-container { scroll-behavior: smooth; }
        .log-success { color: #4ade80; }
        .log-error { color: #f87171; }
        .log-ws { color: #38bdf8; }
    </style>
</head>
<body class="p-6 h-screen flex flex-col">
    <!-- Header -->
    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                Backend Analytics
            </h1>
            <p class="text-slate-400 text-sm mt-1">Real-time Performance & Log Monitoring</p>
        </div>
        <div class="flex items-center space-x-2">
            <span class="relative flex h-3 w-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
            </span>
            <span class="text-sm font-semibold text-emerald-400">Live</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="grid grid-cols-12 gap-6 flex-1 min-h-0">
        <!-- Left Column: Metrics & Charts -->
        <div class="col-span-12 lg:col-span-8 flex flex-col space-y-6 min-h-0">
            <!-- Overview Cards -->
            <div class="grid grid-cols-2 xl:grid-cols-4 gap-6">
                <div class="glass-card rounded-2xl p-6 flex flex-col">
                    <span class="text-slate-400 text-sm font-semibold uppercase tracking-wider">Total Requests</span>
                    <span id="stat-total" class="text-4xl font-extrabold mt-2 text-white">0</span>
                </div>
                <div class="glass-card rounded-2xl p-6 flex flex-col">
                    <span class="text-slate-400 text-sm font-semibold uppercase tracking-wider">Avg Latency (ms)</span>
                    <span id="stat-latency" class="text-4xl font-extrabold mt-2 text-blue-400">0</span>
                </div>
                <div class="glass-card rounded-2xl p-6 flex flex-col">
                    <span class="text-slate-400 text-sm font-semibold uppercase tracking-wider">Active Concurrency</span>
                    <span id="stat-concurrency" class="text-4xl font-extrabold mt-2 text-purple-400">0</span>
                </div>
                <div class="glass-card rounded-2xl p-6 flex flex-col">
                    <span class="text-slate-400 text-sm font-semibold uppercase tracking-wider">WS Connections</span>
                    <span id="stat-ws-active" class="text-4xl font-extrabold mt-2 text-cyan-400">0</span>
                </div>
                <div class="glass-card rounded-2xl p-6 flex flex-col">
                    <span class="text-slate-400 text-sm font-semibold uppercase tracking-wider">WS Delivered</span>
                    <span id="stat-ws-delivered" class="text-4xl font-extrabold mt-2 text-emerald-400">0</span>
                </div>
                <div class="glass-card rounded-2xl p-6 flex flex-col">
                    <span class="text-slate-400 text-sm font-semibold uppercase tracking-wider">WS Offline</span>
                    <span id="stat-ws-offline" class="text-4xl font-extrabold mt-2 text-amber-400">0</span>
                </div>
                <div class="glass-card rounded-2xl p-6 flex flex-col">
                    <span class="text-slate-400 text-sm font-semibold uppercase tracking-wider">WS Errors</span>
                    <span id="stat-ws-errors" class="text-4xl font-extrabold mt-2 text-red-400">0</span>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="grid grid-cols-2 gap-6 flex-1 min-h-0">
                <div class="glass-card rounded-2xl p-6 flex flex-col h-full">
                    <h3 class="text-slate-300 font-semibold mb-4">Request Methods</h3>
                    <div class="relative flex-1">
                        <canvas id="methodChart"></canvas>
                    </div>
                </div>
                <div class="glass-card rounded-2xl p-6 flex flex-col h-full">
                    <h3 class="text-slate-300 font-semibold mb-4">Response Time (Latest)</h3>
                    <div class="relative flex-1">
                        <canvas id="latencyChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Live Terminal Logs -->
        <div class="col-span-12 lg:col-span-4 flex flex-col min-h-0 glass-card rounded-2xl p-4">
            <h3 class="text-slate-300 font-semibold mb-3 px-2 flex items-center justify-between">
                <span>Live Logs</span>
                <span class="text-xs bg-slate-800 text-slate-300 px-2 py-1 rounded-md" id="log-count">0 events</span>
            </h3>
            <div id="terminal" class="flex-1 bg-slate-900 rounded-xl p-4 overflow-y-auto font-mono text-sm log-container space-y-2 border border-slate-700">
                <div class="text-slate-500">Waiting for incoming requests...</div>
            </div>
        </div>
    </main>

    <script>
        // Charts Initialization
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = 'Inter';

        const methodCtx = document.getElementById('methodChart').getContext('2d');
        const methodChart = new Chart(methodCtx, {
            type: 'doughnut',
            data: {
                labels: ['GET', 'POST', 'PUT', 'DELETE'],
                datasets: [{
                    data: [0, 0, 0, 0],
                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'],
                    borderWidth: 0,
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });

        const latencyCtx = document.getElementById('latencyChart').getContext('2d');
        const latencyChart = new Chart(latencyCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Latency (ms)',
                    data: [],
                    borderColor: '#8b5cf6',
                    backgroundColor: 'rgba(139, 92, 246, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    x: { display: false }, 
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } 
                },
                plugins: { legend: { display: false } },
                animation: { duration: 0 } // Disable animation for real-time smoothness
            }
        });

        // DOM Elements
        const statTotal = document.getElementById('stat-total');
        const statLatency = document.getElementById('stat-latency');
        const statConcurrency = document.getElementById('stat-concurrency');
        const statWsActive = document.getElementById('stat-ws-active');
        const statWsDelivered = document.getElementById('stat-ws-delivered');
        const statWsOffline = document.getElementById('stat-ws-offline');
        const statWsErrors = document.getElementById('stat-ws-errors');
        const terminal = document.getElementById('terminal');
        const logCount = document.getElementById('log-count');
        
        let logsCount = 0;
        const maxLogs = 50;

        // SSE Connection
        const eventSource = new EventSource('/api/analytics/stream');
        
        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            // Update Metrics Cards
            statTotal.innerText = data.metrics.total_requests;
            statConcurrency.innerText = data.metrics.active_concurrency;
            statLatency.innerText = Math.round(data.metrics.avg_latency_ms);
            statWsActive.innerText = data.metrics.active_ws_connections ?? 0;
            statWsDelivered.innerText = data.metrics.ws_messages_delivered ?? 0;
            statWsOffline.innerText = data.metrics.ws_messages_offline ?? 0;
            statWsErrors.innerText = data.metrics.ws_errors ?? 0;

            // Update Method Chart
            methodChart.data.datasets[0].data = [
                data.metrics.get_count, 
                data.metrics.post_count, 
                data.metrics.put_count, 
                data.metrics.delete_count
            ];
            methodChart.update();

            // Update Latency Line Chart (keep last 20 points)
            if (data.log) {
                const now = new Date();
                const timeStr = `${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
                
                latencyChart.data.labels.push(timeStr);
                latencyChart.data.datasets[0].data.push(data.log.latency_ms);
                
                if (latencyChart.data.labels.length > 20) {
                    latencyChart.data.labels.shift();
                    latencyChart.data.datasets[0].data.shift();
                }
                latencyChart.update();

                // Add to Terminal Log
                if (logsCount === 0) terminal.innerHTML = ''; // clear waiting text
                
                const logEntry = document.createElement('div');
                const isError = data.log.status_code >= 400;
                
                logEntry.className = `flex justify-between py-1 border-b border-slate-800/50 ${isError ? 'log-error' : 'log-success'}`;
                logEntry.innerHTML = `
                    <span>
                        <span class="font-bold mr-2 text-white">[${data.log.method}]</span> 
                        ${data.log.path}
                    </span>
                    <span class="flex space-x-3 text-slate-400">
                        <span>${data.log.status_code}</span>
                        <span>${Math.round(data.log.latency_ms)}ms</span>
                    </span>
                `;
                
                terminal.appendChild(logEntry);
                logsCount++;
                logCount.innerText = `${logsCount} events`;
                
                // Keep terminal from growing indefinitely
                if (terminal.childNodes.length > maxLogs) {
                    terminal.removeChild(terminal.firstChild);
                }
                
                // Auto scroll to bottom
                terminal.scrollTop = terminal.scrollHeight;
            }

            if (data.ws_event) {
                if (logsCount === 0) terminal.innerHTML = '';

                const logEntry = document.createElement('div');
                const isError = data.ws_event.event === 'error';
                const isOffline = data.ws_event.event === 'message_offline';
                const colorClass = isError ? 'log-error' : (isOffline ? 'text-amber-300' : 'log-ws');

                logEntry.className = `py-1 border-b border-slate-800/50 ${colorClass}`;
                logEntry.innerHTML = `
                    <div class="flex justify-between gap-3">
                        <span>
                            <span class="font-bold mr-2 text-white">[WS:${data.ws_event.event}]</span>
                            ${data.ws_event.detail}
                        </span>
                        <span class="text-slate-400">${new Date().toLocaleTimeString()}</span>
                    </div>
                    <div class="text-xs text-slate-500 mt-1">
                        user=${data.ws_event.user_id ?? '-'} peer=${data.ws_event.peer_id ?? '-'} msg=${data.ws_event.message_id ?? '-'}
                    </div>
                `;

                terminal.appendChild(logEntry);
                logsCount++;
                logCount.innerText = `${logsCount} events`;

                if (terminal.childNodes.length > maxLogs) {
                    terminal.removeChild(terminal.firstChild);
                }

                terminal.scrollTop = terminal.scrollHeight;
            }
        };

        eventSource.onerror = function() {
            statConcurrency.innerText = "ERR";
            statConcurrency.classList.replace("text-purple-400", "text-red-500");
        };
    </script>
</body>
</html>
